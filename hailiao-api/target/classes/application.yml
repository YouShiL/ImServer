# =============================================================================
# 嗨聊 App API（hailiao-api）— 公共配置（所有 profile 共用）
# =============================================================================
# 【单一环境开关】
#   设置其一即可（APP_ENV 优先）：
#     APP_ENV=dev | test | prod
#     或 SPRING_PROFILES_ACTIVE=dev | test | prod
#   也可启动参数：--spring.profiles.active=prod
#   未设置时默认：dev
#
# 【各 profile 数据源 / Redis / OSS】见 application-dev|test|prod.yml
#   · dev / test — 已在对应 yml 中写满默认连接，一般无需再设环境变量
#   · prod — 必须在运行环境注入 DB_*、REDIS_*、OSS_* 等（yml 中无默认值）
# =============================================================================

spring:
  application:
    name: hailiao-api
  profiles:
    active: ${APP_ENV:${SPRING_PROFILES_ACTIVE:dev}}

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

logging:
  level:
    com.hailiao: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}

springfox:
  documentation:
    swagger-ui:
      base-url: /swagger-ui
      display-request-duration: true
      enabled: true
    open-api:
      v3:
        path: /v3/api-docs

# -----------------------------------------------------------------------------
# IM 渐进迁移（Phase 0）：默认与当前行为一致 — 后端不发 WuKong、webhook 关闭、客户端可直发 IM
# -----------------------------------------------------------------------------
im:
  migration:
    mode: legacy
  wukong:
    enabled: false
    api-base-url: http://127.0.0.1:5001
    # 登录/注册/刷新 JWT 后 POST {api-base-url}/user/token，写入 WuKong 侧 uid+token（与 Flutter SDK 一致），否则 TCP 报 device token not found
    sync-user-token-on-auth: true
    manager-token: ""
  webhook:
    enabled: false
    path: /api/im/webhook
    secret: ""
  send:
    via-server: false
  client:
    direct-send-fallback: true

file:
  upload:
    path: ./uploads
    max-size: 10485760
    image-max-size: 5242880
    video-max-size: 104857600
    audio-max-size: 20971520
    allowed-image-types: jpg,jpeg,png,gif,bmp,webp
    allowed-video-types: mp4,avi,mov,wmv,flv,mkv
    allowed-audio-types: mp3,wav,aac,ogg,m4a
