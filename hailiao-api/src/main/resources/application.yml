server:
  port: 8082

spring:
  application:
    name: hailiao-api
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/hailiao?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:6000ms}
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

logging:
  level:
    com.hailiao: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}

springfox:
  documentation:
    swagger-ui:
      base-url: /swagger-ui
      display-request-duration: true
      enabled: true
    open-api:
      v3:
        path: /v3/api-docs

file:
  upload:
    path: ./uploads
    max-size: 10485760
    image-max-size: 5242880
    video-max-size: 104857600
    audio-max-size: 20971520
    allowed-image-types: jpg,jpeg,png,gif,bmp,webp
    allowed-video-types: mp4,avi,mov,wmv,flv,mkv
    allowed-audio-types: mp3,wav,aac,ogg,m4a

oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  bucket-name: ${OSS_BUCKET_NAME:hailiao-im}
  domain: ${OSS_DOMAIN:https://hailiao-im.oss-cn-hangzhou.aliyuncs.com}
  prefix: ${OSS_PREFIX:hailiao}
