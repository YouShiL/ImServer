# =============================================================================
# 开发环境（profile = dev）— API
# =============================================================================
# 连接信息默认写在本文件；仅需启动前设置 APP_ENV=dev（或不设置，默认即 dev）

server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hailiao?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: carmi2023_

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 6000ms

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.hailiao: DEBUG
    org.springframework.security: DEBUG

springfox:
  documentation:
    swagger-ui:
      enabled: true

# IM：与 Flutter --dart-define=IM_SEND_VIA_SERVER=true & IM_CLIENT_DIRECT_SEND_FALLBACK=false 对齐。
# REST 落库后会经 WukongImClient 调 WuKong；若仍为 false，消息不会进入 WuKongIM。
# 请将 api-base-url 改为本机可访问的 WuKong Manager/API 根地址（与 WuKong 实际部署一致）。
im:
  send:
    via-server: true
  wukong:
    enabled: true
    api-base-url: ${WUKONG_API_BASE_URL:http://127.0.0.1:5001}
    manager-token: ${WUKONG_MANAGER_TOKEN:}

