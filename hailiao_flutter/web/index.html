<!-- web/index.html -->
<head>
  <meta charset="UTF-8">
  <title>嗨聊</title>
  <base href="/">
  <meta name="description" content="Flutter Web App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 本地字体声明 -->
  <style>
    /* 中文字体：Source Han Sans SC */
    @font-face {
      font-family: 'Source Han Sans SC';
      src: url('assets/fonts/SourceHanSansSC-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* 英文字体：Roboto */
    @font-face {
      font-family: 'Roboto';
      src: url('assets/fonts/Roboto-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* 图标字体：MaterialIcons */
    @font-face {
      font-family: 'MaterialIcons';
      src: url('assets/fonts/MaterialIcons-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* 全局默认字体 */
    html, body {
      font-family: 'Source Han Sans SC', 'Roboto', sans-serif;
    }
  </style>

  <!-- Flutter Web 生成的 JS/CSS -->
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
