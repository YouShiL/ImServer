# =============================================================================
# 嗨聊管理后台（hailiao-admin）— 公共配置（所有 profile 共用）
# =============================================================================
# 【单一环境开关】APP_ENV 或 SPRING_PROFILES_ACTIVE = dev | test | prod（APP_ENV 优先）
# 【数据源 / Redis】见 application-dev|test|prod.yml
# =============================================================================

spring:
  application:
    name: hailiao-admin
  profiles:
    active: ${APP_ENV:${SPRING_PROFILES_ACTIVE:dev}}

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  redis:
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

logging:
  level:
    com.hailiao: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
