# =============================================================================
# 生产环境（profile = prod）— 管理后台
# =============================================================================
# 设置 APP_ENV=prod，并注入 DB_*、REDIS_*（无默认值）

server:
  port: ${ADMIN_SERVER_PORT:8083}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:6000ms}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.hailiao: INFO
    org.springframework.security: WARN
